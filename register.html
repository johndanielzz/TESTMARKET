<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - Matrix Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #4f46e5, #06b6d4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .register-box {
            background: rgba(30, 41, 59, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
            width: 380px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .register-box h1 {
            margin-bottom: 25px;
            font-size: 2rem;
            font-weight: 800;
            color: #06b6d4;
            text-shadow: 0 0 12px #06b6d4, 0 0 24px #4f46e5;
        }

        .register-box input,
        .register-box select {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.6);
            transition: 0.3s ease;
        }

        .register-box input:focus,
        .register-box select:focus {
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 0 12px #06b6d4, 0 0 20px #4f46e5;
        }

        .register-box button {
            width: 100%;
            padding: 14px;
            margin-top: 18px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #06b6d4, #4f46e5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }

        .register-box button:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            box-shadow: 0 12px 35px rgba(6, 182, 212, 0.6);
        }

        .register-box p {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .register-box a {
            color: #06b6d4;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .register-box a:hover {
            text-shadow: 0 0 8px #06b6d4, 0 0 15px #4f46e5;
        }

        .msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }

        .msg.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="upgrade.css">
    <script src="firebase-online-storage.js"></script>
</head>

<body>

    <div class="register-box">
        <h1>Create Account</h1>
        <form onsubmit="return registerUser(event)">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="text" id="location" placeholder="Location (e.g., Banjul)" required>

            <!-- NEW: Choose account type -->
            <select id="accountType" required>
                <option value="">Select Account Type</option>
                <option value="buyer">Buyer</option>
                <option value="seller">Seller</option>
            </select>

            <button type="submit">Register</button>
        </form>
        <div class="msg success" id="successMsg">✅ Registration successful! Redirecting...</div>
        <div class="msg error" id="errorMsg"></div>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script>
        function normalizeEmail(value) {
            return String(value || "").trim().toLowerCase();
        }

        function safeParse(raw, fallback) {
            if (raw == null || raw === "") return fallback;
            try {
                const parsed = JSON.parse(raw);
                return parsed == null ? fallback : parsed;
            } catch (_) {
                return fallback;
            }
        }

        function readList(key) {
            const parsed = safeParse(MMStorage.getItem(key), []);
            if (Array.isArray(parsed)) return parsed;
            if (parsed && typeof parsed === "object") {
                return Object.keys(parsed).map(function (entryKey) {
                    const entry = parsed[entryKey];
                    if (entry && typeof entry === "object") {
                        if (!entry.email && !entry.mail) return Object.assign({ email: entryKey }, entry);
                        return entry;
                    }
                    return { email: entryKey, value: entry };
                });
            }
            return [];
        }

        async function syncOnlineStorage(timeoutMs) {
            const sync = window.MMStorage && window.MMStorage.syncNow;
            if (!sync || typeof sync !== "function") return;
            const waitMs = Number(timeoutMs) > 0 ? Number(timeoutMs) : 3500;
            try {
                await Promise.race([
                    sync(),
                    new Promise(function (resolve) { setTimeout(resolve, waitMs); })
                ]);
            } catch (_) {}
        }

        async function registerUser(event) {
            event.preventDefault();
            const ready = window.MMStorage && window.MMStorage.ready;
            if (ready && typeof ready.then === "function") {
                await ready.catch(function () {});
            }

            const fullName = document.getElementById("fullName").value.trim();
            const email = normalizeEmail(document.getElementById("email").value);
            const password = document.getElementById("password").value;
            const location = document.getElementById("location").value.trim();
            const accountType = document.getElementById("accountType").value;

            const successMsg = document.getElementById("successMsg");
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.style.display = "none";
            successMsg.style.display = "none";

            if (!fullName || !email || !password || !location || !accountType) {
                errorMsg.innerText = "⚠️ Please fill in all fields.";
                errorMsg.style.display = "block";
                return;
            }

            if (password.length < 4) {
                errorMsg.innerText = "⚠️ Password must be at least 4 characters.";
                errorMsg.style.display = "block";
                return;
            }

            const users = readList("users");
            const sellers = readList("sellers");
            const emailExistsInUsers = users.some(function (u) { return normalizeEmail(u && (u.email || u.mail)) === email; });
            const emailExistsInSellers = sellers.some(function (s) { return normalizeEmail(s && (s.email || s.mail)) === email; });

            if (emailExistsInUsers || emailExistsInSellers) {
                errorMsg.innerText = "⚠️ Email already registered. Please login.";
                errorMsg.style.display = "block";
                return;
            }

            const createdAt = new Date().toISOString();
            const newUser = {
                fullName: fullName,
                name: fullName,
                email: email,
                password: password,
                location: location,
                country: location,
                accountType: accountType,
                role: accountType,
                balance: 0,
                subscription: accountType === "seller" ? "Inactive" : "Active",
                paymentStatus: accountType === "seller" ? "Pending" : "Paid",
                status: accountType === "seller" ? "Pending Approval" : "Active",
                isSeller: accountType === "seller",
                createdAt: createdAt
            };

            users.push(newUser);
            MMStorage.setItem("users", JSON.stringify(users));

            if (accountType === "seller") {
                sellers.push({
                    fullName: fullName,
                    name: fullName,
                    email: email,
                    password: password,
                    phone: "",
                    country: location,
                    address: location,
                    store: "",
                    plan: "Basic",
                    amount: 0,
                    balance: 0,
                    subscription: "Inactive",
                    paymentStatus: "Pending",
                    status: "Pending Approval",
                    isSeller: true,
                    createdAt: createdAt
                });
                MMStorage.setItem("sellers", JSON.stringify(sellers));
            }

            successMsg.style.display = "block";
            MMStorage.setItem("lastRegisteredEmail", email);
            await syncOnlineStorage(4000);
            window.location.href = "login.html?registered=1";
        }
    </script>

    <script defer src="upgrade.js"></script>
</body>

</html>
